<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding: 맞춤형 이력서 분석기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .gradient-text {
            background: linear-gradient(135deg, #4F46E5, #06B6D4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .analyze-btn {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            transition: all 0.3s ease;
        }
        .analyze-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <div class="inline-block px-4 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm font-bold mb-4">Vibe Coding 인터랙티브 실습</div>
            <h1 class="text-4xl md:text-5xl font-black mb-4"><span class="gradient-text">AI 맞춤형 이력서 분석기</span></h1>
            <p class="text-slate-500 text-lg">원하는 조건에 맞춰 AI가 이력서를 즉시 분석합니다.</p>
        </header>

        <!-- Input Form -->
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200 mb-12">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">분석할 파일 디렉토리 선택</label>
                    <div class="relative">
                        <input type="file" id="dir-input" webkitdirectory directory multiple class="hidden" onchange="updateDirName(this)">
                        <button onclick="document.getElementById('dir-input').click()" class="w-full p-3 rounded-xl border border-dashed border-slate-400 text-slate-500 hover:bg-slate-50 transition-colors flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
                            <span id="dir-display-name">폴더 선택하기</span>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">모집 직무</label>
                    <select id="job-select" class="w-full p-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                        <option value="">직무를 선택하세요</option>
                        <option value="Backend Developer">Backend Developer</option>
                        <option value="Frontend Developer">Frontend Developer</option>
                        <option value="UI/UX Designer">UI/UX Designer</option>
                        <option value="Data Analyst">Data Analyst</option>
                        <option value="Cloud Engineer">Cloud Engineer</option>
                        <option value="DevOps Engineer">DevOps Engineer</option>
                        <option value="Project Manager">Project Manager</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">필요 경력 (비워두면 신입)</label>
                    <input type="text" id="exp-input" placeholder="예: 3년" class="w-full p-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            <button onclick="startAnalysis()" class="analyze-btn w-full py-4 text-white font-black text-xl rounded-2xl shadow-lg">
                분류 및 분석 시작하기
            </button>
        </div>

        <!-- Result Section (Hidden by default) -->
        <div id="result-section" class="hidden space-y-12">
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <p class="text-slate-400 text-sm mb-1">분석 대상</p>
                    <p class="text-3xl font-black text-slate-800">30</p>
                </div>
                <div id="selected-job-card" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center text-indigo-600">
                    <p class="text-slate-400 text-sm mb-1">매칭 직무</p>
                    <p id="stat-job" class="text-xl font-black truncate px-2">-</p>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center text-emerald-600">
                    <p class="text-slate-400 text-sm mb-1">합격 판정</p>
                    <p class="text-3xl font-black">30</p>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center text-amber-500">
                    <p class="text-slate-400 text-sm mb-1">평균 적합도</p>
                    <p id="stat-score" class="text-3xl font-black">94%</p>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm uppercase font-bold">
                                <th class="px-6 py-4">No</th>
                                <th class="px-6 py-4">이름</th>
                                <th class="px-6 py-4">파일 형식</th>
                                <th class="px-6 py-4 text-center">적합도 점수</th>
                                <th class="px-6 py-4">분류 결과</th>
                            </tr>
                        </thead>
                        <tbody id="result-body" class="divide-y divide-slate-100 text-slate-700">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-16 text-center text-slate-400 text-sm">
            <p>© 2026 MegazoneCloud AI Vibe Coding Practice</p>
        </footer>
    </div>

    <script>
        // 파일 읽기를 위한 유틸리티 함수
        function readFileContent(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsText(file); // 텍스트 기반 가짜 PDF/DOCX를 읽기 위해 사용
            });
        }

        function updateDirName(input) {
            const displayName = document.getElementById('dir-display-name');
            if (input.files.length > 0) {
                const firstFile = input.files[0];
                const pathParts = firstFile.webkitRelativePath.split('/');
                const folderName = pathParts.length > 1 ? pathParts[0] : "선택된 폴더";
                displayName.innerText = `${folderName} (${input.files.length}개 파일)`;
                displayName.classList.remove('text-slate-500');
                displayName.classList.add('text-indigo-600', 'font-bold');
            }
        }

        async function startAnalysis() {
            const selectedJob = document.getElementById('job-select').value;
            const exp = document.getElementById('exp-input').value || "신입";
            const dirInput = document.getElementById('dir-input');
            const resultSection = document.getElementById('result-section');
            const resultBody = document.getElementById('result-body');
            const statJob = document.getElementById('stat-job');
            
            if (!selectedJob) { alert("모집 직무를 선택해주세요."); return; }
            if (dirInput.files.length === 0) { alert("분석할 파일이 들어있는 폴더를 먼저 선택해주세요."); return; }

            // 로딩 상태 표시
            statJob.innerText = "분석 중...";
            resultBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400">AI가 파일을 읽고 분석하는 중입니다...</td></tr>';
            resultSection.classList.remove('hidden');

            const files = Array.from(dirInput.files).filter(f => !f.name.startsWith('.')); // 시스템 파일 제외
            let analysisResults = [];

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                let name = "Unknown";
                let baseJob = "Unknown";
                
                try {
                    const content = await readFileContent(file);
                    const nameMatch = content.match(/Name:\s*(.*)/i);
                    const jobMatch = content.match(/Position:\s*(.*)/i);
                    
                    name = nameMatch ? nameMatch[1].trim() : file.name.split('_')[2]?.replace(/\.[^/.]+$/, "") || file.name;
                    baseJob = jobMatch ? jobMatch[1].trim() : "기타 직무";
                } catch (e) {
                    console.error("파일 읽기 실패:", file.name);
                }

                const ext = file.name.split('.').pop().toUpperCase();
                const isMatch = baseJob.toLowerCase().includes(selectedJob.split(' ')[0].toLowerCase()) || 
                                selectedJob.toLowerCase().includes(baseJob.split(' ')[0].toLowerCase());
                
                let score, status, passOrder;
                if (isMatch) {
                    score = Math.floor(Math.random() * (99 - 90 + 1)) + 90;
                    status = '<span class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-black italic shadow-sm">★ PASS (합격)</span>';
                    passOrder = 0; // 합격자 우선 순위
                } else {
                    score = Math.floor(Math.random() * (70 - 30 + 1)) + 30;
                    status = '<span class="px-3 py-1 bg-rose-100 text-red-600 rounded-full text-xs font-black italic shadow-sm">✘ FAIL (불합격)</span>';
                    passOrder = 1;
                }

                analysisResults.push({
                    name, baseJob, ext, score, status, isMatch, passOrder, fileName: file.name
                });
            }

            // 합격자(passOrder 0) 먼저, 그 다음 불합격자(passOrder 1) 순으로 정렬
            analysisResults.sort((a, b) => a.passOrder - b.passOrder || b.score - a.score);

            let rowsHtml = "";
            let passCount = 0;
            let totalScore = 0;

            analysisResults.forEach((res, i) => {
                if (res.isMatch) passCount++;
                totalScore += res.score;

                const extColor = res.ext === "PDF" ? "text-red-500" : (res.ext === "DOCX" ? "text-blue-500" : "text-orange-500");
                
                rowsHtml += `
                    <tr class="hover:bg-slate-50 transition-colors animate-fadeIn" style="animation-delay: ${i * 0.03}s">
                        <td class="px-6 py-4 text-sm text-slate-400">${(i + 1).toString().padStart(2, '0')}</td>
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800">${res.name}</div>
                            <div class="text-[10px] text-slate-400 font-medium">분석된 직무: ${res.baseJob}</div>
                        </td>
                        <td class="px-6 py-4 text-xs font-black ${extColor}">${res.ext}</td>
                        <td class="px-6 py-4 text-center font-mono font-black ${res.isMatch ? 'text-indigo-600' : 'text-slate-400'}">${res.score}%</td>
                        <td class="px-6 py-4">${res.status}</td>
                    </tr>
                `;
            });

            // UI Update
            statJob.innerText = `${selectedJob} (${exp})`;
            resultBody.innerHTML = rowsHtml;
            document.getElementById('stat-score').innerText = Math.floor(totalScore / files.length) + "%";
            document.querySelector('#result-section .text-emerald-600 p:last-child').innerText = passCount;
            document.querySelector('#result-section .text-slate-800').innerText = files.length;

            window.scrollTo({ top: resultSection.offsetTop - 50, behavior: 'smooth' });
        }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</body>
</html>
